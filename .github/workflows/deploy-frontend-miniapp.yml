# Telegram Mini App: статика из dist (в т.ч. index-mobile.html) на отдельный каталог на VPS.
# Ветка: test_deploy_miniapp
#
# GitHub → Settings → Secrets and variables → Actions
#   Secrets: VPS_HOST, VPS_USER, VPS_SSH_KEY, VPS_SSH_PORT (опционально), FRONTEND_MINIAPP_DIST_PATH
#   Variables: VITE_MINIAPP_API_BASE_URL (предпочтительно) или задайте только VITE_API_BASE_URL — подставится как запасной

name: Deploy Frontend Mini App (test_deploy_miniapp)

on:
  push:
    branches:
      - test_deploy_miniapp
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend (main + mobile entries)
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_MINIAPP_API_BASE_URL || vars.VITE_API_BASE_URL }}
        run: npm run build

      - name: Upload dist to VPS (miniapp)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          source: "dist/*"
          target: "${{ secrets.FRONTEND_MINIAPP_DIST_PATH }}"
          overwrite: true

      - name: Reload Caddy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          script: |
            set -euo pipefail
            systemctl reload caddy || true
